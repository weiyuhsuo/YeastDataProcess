# ===== Hydra框架基本配置 =====
# Hydra是Facebook开发的配置管理框架，用于管理复杂的实验配置
defaults:
  - _self_                    # 继承当前配置文件本身
  - override hydra/hydra_logging: disabled    # 禁用Hydra框架自身的日志输出
  - override hydra/job_logging: disabled      # 禁用Hydra作业日志，避免日志冲突

# ===== 训练阶段配置 =====
stage: "fit"                  # 训练阶段标识："fit"表示训练模式，"test"表示测试模式
eval_tss: false               # 是否评估TSS（转录起始位点），当前关闭

# ===== 微调配置模板（注释掉的示例） =====
# Inherit from a finetune config template if available and appropriate
# - finetune: v1_finetune@finetune # 示例：继承微调配置模板

# ===== 实验基础配置 =====
experiment:
  name: yeast_atac_training   # 实验名称，用于标识和区分不同实验
  seed: 42                    # 随机种子：控制所有随机过程（权重初始化、数据打乱、dropout等）
                              # 42是经典选择，确保实验可重复性
  debug: false                # 调试模式开关：true时启用详细调试信息，false为正常模式

# ===== 训练超参数配置（针对A100 GPU优化） =====
training:
  batch_size: 4096            # 批次大小：每次训练使用的样本数量，4096适合A100 GPU显存
  num_workers: 16             # 数据加载器工作进程数：并行加载数据，16是CPU核心数的合理比例
  learning_rate: 0.004        # 学习率：参数更新步长，0.004配合大批次训练使用
  weight_decay: 0.01          # 权重衰减：L2正则化系数，防止过拟合
  max_epochs: 100             # 最大训练轮数：完整遍历数据集的次数上限（配合带重启的余弦调度）
  warmup_epochs: 3            # 预热轮数：学习率从0线性增长到目标值的轮数，提升训练稳定性
  early_stopping_patience: 15 # 早停耐心值：验证损失连续10轮不改善时停止训练
  early_stopping_min_delta: 0.01  # 早停最小改善阈值：只有改善超过此值才重置耐心计数器
  clip_grad: 1.0              # 梯度裁剪阈值：防止梯度爆炸，将梯度范数限制在1.0以内
  use_fp16: true              # 混合精度训练：使用16位浮点数加速训练，节省显存

# ===== 数据路径配置（集中管理，便于修改） =====
# KM酵母数据：4个样本（C-1, C-3, O-2, O-3）
data:
  input_files:
    c1: 'input/260128SCKM/matrix_C1.csv.npz'  # C-1样本（对照组）
    c3: 'input/260128SCKM/matrix_C3.csv.npz'  # C-3样本（对照组）
    o2: 'input/260128SCKM/matrix_O2.csv.npz'  # O-2样本（实验组）
    o3: 'input/260128SCKM/matrix_O3.csv.npz'  # O-3样本（实验组）
    atac1: 'input/260128SCKM/ATAC1.npz'       # ATAC1整合样本（额外加入混合训练）
  # ===== 数据集权重配置 =====
  # 用于控制训练时各数据集的采样权重
  # 权重越高，该数据集在训练时被采样的概率越大
  # 默认权重为1.0，表示均匀采样
  # 示例：提高KM四份数据的权重，降低ATAC1的权重
  dataset_weights:
    c1: 2.0      # C-1样本权重（提高2倍）
    c3: 2.0      # C-3样本权重（提高2倍）
    o2: 2.0      # O-2样本权重（提高2倍）
    o3: 2.0      # O-3样本权重（提高2倍）
    atac1: 0.5   # ATAC1样本权重（降低到0.5倍）
  # 是否启用数据集权重采样（设为false则使用均匀采样）
  use_dataset_weights: true
  output_base_dir: 'output'    # 所有输出文件的基础目录
  # 新增：数据划分策略，可选:
  #   'peak'   : 按基因组位点划分 (同一peak所有样本/条件进入同一集合)。
  #              优势: 测试模型在未见过位点上的泛化；风险: 基因级评估需对缺列做归一化修正。
  #   'sample' : 按样本划分 (一个样本的全部peaks保持在同一集合)。
  #              优势: 基因级评估无峰缺失，数值更稳定；风险: 对新位点泛化不足。
  # 本项目当前论文主结果建议：peak 划分 + 明确区分 PEAK vs GENE level 指标。
  split_strategy: 'sample'
  # 多数据集是否允许尝试 gene-level 评估（若某子数据集缺失映射则自动跳过该子集）。
  multi_dataset_gene_eval: true
  # ====== 基因级真实TPM支持 ======
  # real_gene_tpm_csv: 指向包含真实基因TPM的CSV文件；需含首列基因ID，后续列为各条件/重复的TPM值。
  # use_real_gene_truth: 若为true，将在gene级评估时使用此CSV汇总(按gene_truth_reduce聚合)作为真实值。
  # gene_truth_reduce: 真实TPM多列聚合方式：mean | median | max | min。
  # tpm_aggregation: 对模型 peak 预测的 gene 聚合策略：
  #   'logspace_direct' -> 现有方式：直接在 log2(TPM+1) 空间用 g2p 权重聚合。
  #   'tpm_then_log'   -> 先反变换到TPM: TPM = 2**log2_expr - 1, 聚合后再 log2(TPM+1)。更贴近真实计数。
  real_gene_tpm_csv: 'input/251104/KM数据第一批.csv'
  use_real_gene_truth: true
  gene_truth_reduce: 'mean'
  tpm_aggregation: 'tpm_then_log'  # 使用TPM域聚合（生物学正确方式）
  
  # 滑动窗口配置（用于train_yeast_windowed.py）
  window_size: 200             # 窗口大小：每次输入200个连续peaks
  step_size: 100               # 滑动步长：每隔100个peaks采样一次
  max_span_bp: 5000000         # 窗口最大跨度：5Mb（避免跨越染色体臂）

# ===== 训练任务描述配置 =====
training_name: 'KM ATAC Single Peak Training'        # 训练任务名称，用于日志和报告
training_description: '使用KM酵母ATAC数据训练，采用单Peak方法'  # 训练任务详细描述
output_dir: 'km_atac_single_peak_training'           # 本次训练的输出子目录

# ===== 日志和监控配置 =====
logging:
  save_dir: 'output/km_yeast_atac_training'          # 日志文件保存目录
  tensorboard: true                               # 启用TensorBoard可视化：记录训练曲线和指标
  wandb: true                                     # 启用Weights & Biases：云端实验跟踪平台
  project_name: 'km_yeast_atac_training'             # W&B项目名称
  run_name: 'km_atac_single_peak_v1'                # 当前运行名称，用于区分不同实验
  use_wandb: false                                # 实际是否使用W&B：false表示暂时关闭

# ===== 推理默认配置（可被命令行参数覆盖） =====
inference:
  # KM数据集推理路径（4个文件）
  data_path: 'input/KM/matrix_C1.csv.npz'          # 默认推理数据（C1样本）
  # 多数据集推理路径列表（可选，如果推理脚本支持）
  data_paths:
    - 'input/KM/matrix_C1.csv.npz'                 # C-1样本
    - 'input/KM/matrix_C3.csv.npz'                 # C-3样本
    - 'input/KM/matrix_O2.csv.npz'                 # O-2样本
    - 'input/KM/matrix_O3.csv.npz'                 # O-3样本
  model_path: 'output/km_atac_single_peak_training/best_model.pth'  # 训练后模型路径占位，可按实际修改
  batch_size: 512
  device: 'auto'
  output_base_dir: 'output'

# ===== 学习率调度器配置 =====
scheduler:
  type: 'cosine'              # 调度器类型：余弦退火调度
  cosine:
    eta_min: 1e-5             # 最小学习率：从1e-6提高到3e-5，避免后期衰减过快
    
# 学习率调度策略说明：
# 策略：余弦退火 + Warmup (CosineAnnealingLR)
# 
# 训练流程（100 epochs, warmup=2）：
# 1. Warmup (0-2轮):    学习率从0线性增长到0.006（提供训练初期稳定性）
# 2. Cosine Decay (2-100轮): 余弦衰减，峰值0.006 → 最低3e-5
# 
# 优势：
# - 简单稳定，适合大部分场景
# - 学习率平滑下降，不会突然跳跃
# - eta_min=3e-5 足够大，避免后期学习率过小
# 
# 学习率曲线：
# - Epoch 0-2:   0 → 0.006 (warmup)
# - Epoch 2-100: 0.006 → 3e-5 (cosine decay)

# ===== 模型架构配置 =====
# KM酵母特征维度：470 motifs + 1 accessibility + 74 conditions = 545
model:
  model:
    # 区域嵌入层配置
    region_embed:
      num_features: 545       # 输入特征维度：470个motif + 1个accessibility + 74个条件特征
      embed_dim: 768          # 嵌入维度：将输入特征映射到768维向量空间
    
    # Transformer编码器配置
    encoder:
      embed_dim: 768         # 编码器嵌入维度：与输入嵌入保持一致
      num_heads: 12          # 多头注意力头数：12个头，每个头64维（768/12=64）
      num_layers: 12         # Transformer层数：12层编码器，类似BERT-base架构
      dropout: 0.1           # Dropout率：训练时随机丢弃10%的神经元，防止过拟合
    
    # 表达预测头配置
    head_exp:
      embed_dim: 768         # 输入维度：接收编码器输出的768维特征
      output_dim: 2          # 输出维度：预测正链和负链的表达水平
    
    # 掩码令牌配置
    mask_token:
      embed_dim: 768         # 掩码令牌维度：与模型其他部分保持一致
      std: 0.02              # 掩码令牌初始化标准差：小方差初始化
    
    # 损失函数配置
    loss:
      components:
        exp:                 # 表达预测损失组件
          _target_: torch.nn.MSELoss  # 使用均方误差损失函数
          reduction: "mean"           # 损失计算方式：对所有样本求平均
      weights:
        exp: 1.0             # 损失权重：表达预测损失的权重系数
    
    # 评估指标配置
    metrics:
      components:
        exp: ["pearson", "spearman", "r2"]  # 表达预测的评估指标：皮尔逊相关系数、斯皮尔曼相关系数、R²决定系数